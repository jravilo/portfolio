<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio showcase with infinite scroll" />
    <meta name="theme-color" content="#007bff" />
    
    <title>Portfolio</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23007bff' width='100' height='100'/><text x='50' y='65' font-size='80' text-anchor='middle' fill='white' font-weight='bold'>P</text></svg>" />

    <!-- DNS Prefetch for performance -->
    <link rel="dns-prefetch" href="https://via.placeholder.com" />
  </head>

  <body>
    <!-- Header -->
    <header>
      <h1>Game Portfolio</h1>
      <p>Showcasing my game projects</p>
    </header>

    <!-- Navigation -->
    <nav>
      <div class="container-fluid flex-between">
        <div class="flex gap-lg">
          <a href="#games" data-section="games-section" class="active">Games</a>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1">
      <!-- Games Section -->
      <section id="games-section" class="active container-fluid">
        <div class="flex-column" style="min-height: 100vh">
          <h2>Game Projects</h2>

          <!-- Game search -->
          <input
            type="text"
            id="games-search"
            class="search-input"
            placeholder="Search games..."
            aria-label="Search games"
          />

          <!-- Games scroll container -->
          <div id="games-scroll" class="scroll-content">
            <!-- Game cards will be rendered here -->
          </div>

          <!-- Loading sentinel for infinite scroll -->
          <div id="games-sentinel" class="loading-sentinel">
            <span>Loading more games...</span>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 Portfolio. All rights reserved.</p>
      <p>Built with TypeScript, vanilla CSS, and infinite scroll.</p>
    </footer>

    <!-- Main application bundle -->
    <script src="./bundle.js"></script>
  </body>
</html>
